<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>To Do — список задач</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="To Do" />
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/2387/2387635.png" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/2387/2387635.png" />

  <script>
    try {
      if (localStorage.getItem("mstodo_theme") === "dark") {
        document.documentElement.classList.add("dark");
      }
    } catch {}
  </script>

  <script>tailwind.config = { darkMode: "class" };</script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Все три либы с jsDelivr UMD: единый CDN, обычные скрипты, без ESM/import.
       Раньше Lucide грузился с esm.sh ESM — на мобильных и в эмуляторе
       (другой UA / иногда другая маршрутизация Cloudflare) пакет не доезжал,
       и иконки рендерились пустыми квадратами. -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/lucide@0.445.0/dist/umd/lucide.min.js" onload="window.dispatchEvent(new Event('lucide-ready'))" onerror="window.Lucide={};window.dispatchEvent(new Event('lucide-ready'))"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Спиннер виден сразу, до загрузки React -->
  <div id="app-loading" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#faf9f8;z-index:9999;font-family:system-ui">
    <div style="width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:_spin 0.8s linear infinite"></div>
    <p style="margin-top:16px;color:#6b7280;font-size:14px" id="app-loading-msg">Загрузка…</p>
  </div>
  <div id="root"></div>

  <script>{{COMPILED_APP}}</script>
</body>
</html>
